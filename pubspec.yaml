name: time_for_your_medicine
description: "Pillpal — a friendly medicine reminder app."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # State management + DI
  flutter_riverpod: ^2.6.1

  # Routing
  auto_route: ^10.1.0

  # Local database
  drift: ^2.28.1
  drift_flutter: ^0.2.7

  # Functional error handling
  fpdart: ^1.1.1

  # Testable wall-clock access ("today")
  clock: ^1.1.2

  # Models / unions
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0

  # Logging
  talker_flutter: ^5.0.1
  talker_riverpod_logger: ^5.0.1

  # UI
  google_fonts: ^6.2.1
  file_selector: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  build_runner: ^2.4.13
  auto_route_generator: ^10.2.0
  drift_dev: ^2.28.1
  freezed: ^3.2.3
  json_serializable: ^6.9.0

  # Used directly in test/dose_log_migration_test.dart to hand-build a
  # broken pre-migration schema fixture.
  sqlite3: ^2.9.4

flutter:
  uses-material-design: true
  generate: true
